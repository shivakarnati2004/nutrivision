# Render Blueprint — NutriVision Deployment
# https://render.com/docs/blueprint-spec

services:
  # Web Service (Express API + React SPA)
  - type: web
    name: nutrivision
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: nutrivision-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false  # Set manually
      - key: SMTP_PASSWORD
        sync: false  # Set manually
      - key: EMAIL_FROM
        sync: false  # Set manually
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      - key: OTP_LENGTH
        value: "6"
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: nutrivision-db
    plan: free
    databaseName: nutrivision
    region: oregon
